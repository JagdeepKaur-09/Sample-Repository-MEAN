<nav class="navbar navbar-dark bg-dark px-4 d-flex justify-content-between">
  <span class="navbar-brand">📸 EventSnap AI — Upload Photos</span>
  <button class="btn btn-outline-light btn-sm" (click)="router.navigate(['/dashboard'])">← Back</button>
</nav>

<div class="container mt-5">
  <div class="card p-4 shadow col-md-6 mx-auto">
    <h4 class="mb-4">Upload Event Photos</h4>

    <div *ngIf="errorMsg" class="alert alert-danger alert-dismissible">
      {{ errorMsg }}
      <button type="button" class="btn-close" (click)="errorMsg = ''"></button>
    </div>

    <div class="mb-3">
      <label class="form-label">Select Photos</label>
      <input type="file" class="form-control" multiple accept="image/*" (change)="onFilesSelected($event)"
        [disabled]="uploading">
    </div>

    <div *ngIf="selectedFiles.length > 0 && !uploading" class="mb-3 text-muted small">
      {{ selectedFiles.length }} photo(s) selected
    </div>

    <div *ngIf="uploading" class="mb-3">
      <div class="d-flex justify-content-between mb-1">
        <small>Uploading...</small>
        <small>{{ uploadedCount }} / {{ selectedFiles.length }}</small>
      </div>
      <div class="progress" style="height: 10px;">
        <div class="progress-bar progress-bar-striped progress-bar-animated" [style.width.%]="uploadProgress">
        </div>
      </div>
    </div>

    <button class="btn btn-primary w-100" (click)="uploadPhotos()" [disabled]="uploading || selectedFiles.length === 0">
      {{ uploading ? 'Uploading...' : 'Upload Photos' }}
    </button>
  </div>
</div>
