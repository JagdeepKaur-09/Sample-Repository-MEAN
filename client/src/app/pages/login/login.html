<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card p-4 shadow">
        <h3 class="text-center mb-4">Login</h3>

        <div class="mb-3">
          <label>Email</label>
          <input type="email" class="form-control" [(ngModel)]="email" placeholder="Enter email">
        </div>

        <div class="mb-3">
          <label>Password</label>
          <input type="password" class="form-control" [(ngModel)]="password" placeholder="Enter password">
        </div>

        <div *ngIf="errorMsg" class="alert alert-danger">{{ errorMsg }}</div>

        <button class="btn btn-primary w-100" (click)="login()">Login</button>

        <p class="text-center mt-3">Don't have an account? <a routerLink="/signup">Sign Up</a></p>
      </div>
    </div>
  </div>
</div>
